default_plot_x: "Laser Processing Parameters: Scan Speed (mm/s)"
default_plot_y: "Laser Processing Parameters: Laser Power (W)"
default_plot_colour: "Materials: Substrate material"
default_filters:
  "General: Experiment type": ["Weld", "AM"]
groups:
  - name: General
    always_on: true
    variables:
      - name: Run ID
        type: auto_increment
        format: prefixed
        prefix: "RUN"
        pad: 4
        start: 1
        help: ""
        required: true
      - name: Operator
        type: text
        default: ""
        help: "Current Operator / Shift Leader initials. Ex: HEC/YH/SB"
        required: true
      - name: Experiment type
        type: select
        options: [Setup, Weld, AM, Flat]
        default: Setup
        help: "Type of Experiment"
        required: true
      - name: Layer number
        type: integer
        default: 0
        help: ""
      - name: Build location
        type: integer
        default: 0
        help: ""
      - name: Notes
        type: text
        default: ""
        help: "Free text entry. Add notes on the run here"
        required: false

  - name: X-ray beam settings
    always_on: false
    variables:
      - name: Beamline
        type: select
        options: [DLS I12, ESRF ID19, HEPS ID23, APS ID32, Other]
        default: DLS I12
        help: "Current beamline or Laboratory Environment"
      - name: Beam Energy (KeV)
        type: float
        default: 0
        help: ""
      - name: Exposure time (us)
        type: float
        default: 0
        help: ""
      - name: Framerate (kfps)
        type: float
        default: 0
        help: ""
      - name: Pixel Size (um)
        type: float
        default: 0
        help: ""
      - name: X-ray scan number
        type: auto_increment
        format: padded
        pad: 4
        start: 1
        help: ""

  - name: Sample
    always_on: true
    filterable: true
    variables:
      - name: Substrate ID
        type: text
        default: ""
        help: ""
      - name: Substrate material
        type: text
        default: ""
        help: ""
      - name: Powder material
        type: text
        default: ""
        help: ""
      - name: Sample manipulation
        type: text
        default: "Meca500 6-axis Robotic arm"
        help: ""

  - name: Laser Processing Parameters
    always_on: true
    filterable: true
    variables:
      - name: Laser Power (W)
        type: float
        default: 0
        help: ""
      - name: Scan Speed (mm/s)
        type: float
        default: 0
        help: ""
      - name: Laser Spot Size (mm)
        type: float
        default: 0
        help: ""
      - name: Laser
        type: text
        default: "TruFiber 500 P compact (FD44-A)"
        help: ""
      - name: Optics
        type: text
        default: "Optogama beam reducer"
        help: ""


  - name: Ultrasonic Processing Parameters
    always_on: false
    filterable: true
    variables:
      - name: Amplitude (%)
        type: float
        default: 0
        help: ""
      - name: Frequency (kHz)
        type: float
        default: 35.14
        help: ""

  - name: Powder delivery
    always_on: true
    variables:
      - name: Feed rate (rpm)
        type: float
        default: 0
        help: ""
      - name: Shield Gas (lpm)
        type: float
        default: 0
        help: ""
      - name: Carrier gas (lpm)
        type: float
        default: 0
        help: ""        
      - name: Powder feeder
        type: text
        default: "GTV PF 2/2 LC"
        help: ""
      - name: Nozzle
        type: select
        options: [HighNo 4.0 - 7mm standoff, HighNo 4.0 - 19 degree, Other (add in notes)]
        default: HighNo 4.0 - 7mm standoff
        help: ""
